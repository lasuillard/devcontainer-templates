name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Check code formatting
        run: |
          git ls-files '*.sh' \
            | tee /dev/stderr \
            | xargs nix run .#shfmt -- --diff

      - name: Lint code
        run: |
          git ls-files '*.sh' \
            | tee /dev/stderr \
            | xargs nix run .#shellcheck --

  list-templates:
    name: List templates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      templates: ${{ steps.list.outputs.templates }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: List templates
        id: list
        run: |
          # Make JSON list of all templates; e.g. ["kubernetes-tools","openapi-generator-cli","opentofu"]
          templates="$( \
            git ls-files './src/*/devcontainer-template.json' \
            | xargs --replace='{}' sh -c 'basename "$(dirname "{}")"' \
            | jq --raw-input . \
            | jq --slurp --compact-output .
          )"

          echo "templates=${templates}" | tee --append "$GITHUB_OUTPUT"

  test:
    name: Test (${{ matrix.templates }})
    needs: [list-templates]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        templates: ${{ fromJSON(needs.list-templates.outputs.templates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Dev Container CLI
        run: npm install --global @devcontainers/cli

      - name: Test template
        run: ./scripts/test-template.sh '${{ matrix.templates }}'
